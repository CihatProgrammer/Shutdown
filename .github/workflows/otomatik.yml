name: Gunluk Ezan Saati Guncelleme

on:
  schedule:
    - cron: '0 1 * * *' # Her gun UTC saatiyle 01:00'da calisir
  workflow_dispatch: # İstersen GitHub üzerinden manuel butonla da tetikleyebilirsin

jobs:
  update-time:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v3

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Saati Guncelle
        run: python guncelle.py

      - name: Degisiklikleri Githuba Kaydet
        run: |
          git config --global user.name "Sistem Botu"
          git config --global user.email "bot@github.com"
          git add komuta_merkezi.json
          git commit -m "Kapanma saati otomatik guncellendi" || exit 0
          git push
